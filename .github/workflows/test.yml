name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FOUNDRY_BASE: https://github.com/LuganoPlanB/swissledger-foundry/releases/download/v1.8.1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Download swissledger-forge
        run: |
          mkdir -p bin
          curl -fL -o bin/swissledger-forge "$FOUNDRY_BASE/swissledger-forge"
          chmod +x bin/swissledger-forge

      - name: Download swissledger-cast
        run: |
          curl -fL -o bin/swissledger-cast "$FOUNDRY_BASE/swissledger-cast"
          chmod +x bin/swissledger-cast

      - name: Download swissledger-anvil
        run: |
          curl -fL -o bin/swissledger-anvil "$FOUNDRY_BASE/swissledger-anvil"
          chmod +x bin/swissledger-anvil

      - name: Generate local keyring
        run: ./scripts/keygen

      - name: Run full test surface
        run: make test-all

      - name: On-chain smoke (ledger.swiss)
        run: ./scripts/on-chain-smoke
        env:
          SWISSLEDGER_TESTING_KEY: ${{ secrets.SWISSLEDGER_TESTING_KEY }}
        continue-on-error: true
