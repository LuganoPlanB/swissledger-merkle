name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Node dependencies
        run: npm ci

      - name: Generate local keyring
        run: ./scripts/keygen

      - name: Build contracts
        run: make build

      - name: Regenerate vectors
        run: make generate-vectors

      - name: Test client
        run: make test-client

      - name: Test Solidity
        run: make test-solidity

      - name: Test generated parity
        run: make test-parity

      - name: Run smoke flow
        run: make test-smoke
