name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FOUNDRY_REPO: LuganoPlanB/swissledger-foundry

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - name: Download swissledger-forge
        run: |
          mkdir -p bin
          gh release download --repo "$FOUNDRY_REPO" --pattern 'swissledger-forge' --output bin/swissledger-forge
          chmod +x bin/swissledger-forge
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download swissledger-cast
        run: |
          gh release download --repo "$FOUNDRY_REPO" --pattern 'swissledger-cast' --output bin/swissledger-cast
          chmod +x bin/swissledger-cast

      - name: Download swissledger-anvil
        run: |
          gh release download --repo "$FOUNDRY_REPO" --pattern 'swissledger-anvil' --output bin/swissledger-anvil
          chmod +x bin/swissledger-anvil

      - name: Build
        run: make build

      - name: Test client
        run: make test-client

      - name: Test solidity
        run: make test-solidity

      - name: Generate vectors
        run: make generate-vectors

      - name: Test parity
        run: make test-parity

      - name: Test smoke (local anvil)
        run: make test-smoke
