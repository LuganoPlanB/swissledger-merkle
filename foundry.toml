[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
evm_version = "istanbul"
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.istanbul]
evm_version = "istanbul"
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200
via_ir = true

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
